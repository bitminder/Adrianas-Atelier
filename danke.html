<!DOCTYPE html>
<html lang="de-AT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, follow" />
  <title>Vielen Dank | Adrianas Atelier</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet" />
  <style>
    :root { --ink:#2f2730; --muted:#756a75; --rose-dark:#bc6f7a; --success:#2f7d55; --success-bg:#edf8f1; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; padding:24px; font-family:"DM Sans",sans-serif; color:var(--ink); background:linear-gradient(135deg,#fff8f1 0%,#f8efe9 50%,#f3eef7 100%); }
    main { width:min(680px,100%); background:white; border-radius:32px; padding:clamp(34px,7vw,68px); text-align:center; box-shadow:0 18px 50px rgba(66,47,62,.14); }
    .icon { width:86px; height:86px; margin:0 auto 24px; display:grid; place-items:center; border-radius:50%; background:var(--success-bg); color:var(--success); font-size:44px; font-weight:700; }
    h1 { margin:0; font-family:"Playfair Display",serif; font-size:clamp(2.5rem,7vw,4.6rem); line-height:1.05; }
    p { margin:22px auto 30px; max-width:520px; color:var(--muted); font-size:1.08rem; }
    a { display:inline-flex; align-items:center; justify-content:center; padding:15px 25px; border-radius:999px; background:var(--ink); color:white; text-decoration:none; font-weight:700; box-shadow:0 10px 24px rgba(47,39,48,.18); }
  </style>
</head>
<body>
  <main>
    <div class="icon" aria-hidden="true">✓</div>
    <h1>Vielen Dank!</h1>
    <p>Deine Anfrage wurde erfolgreich übermittelt. Wir melden uns so bald wie möglich bei dir.</p>
    <a href="https://adrianas-atelier.com/#werke">Zurück zu den Kunstwerken</a>
  </main>
</body>
</html>
